<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SEO Rewrite Manager</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#080b10;--bg2:#0e1318;--sur:#131820;--sur2:#1a2030;
  --bdr:#1e2838;--bdr2:#28374a;
  --txt:#d4dce8;--mut:#4a5568;--mut2:#6b7a90;
  --acc:#00e5a0;--acc2:#00b880;
  --red:#ff3d5a;--yel:#f5c842;--blu:#3d8fff;--pur:#a855f7;
  --mono:'IBM Plex Mono',monospace;
  --sans:'IBM Plex Sans JP',sans-serif;
  --r:10px;--rl:14px;
}
html{font-size:14px}
body{background:var(--bg);color:var(--txt);font-family:var(--sans);min-height:100vh;-webkit-font-smoothing:antialiased;overflow:hidden}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--bdr2);border-radius:99px}

/* layout */
.wrap{display:flex;height:100vh}

/* sidebar */
.sb{
  width:220px;flex-shrink:0;
  background:var(--bg2);border-right:1px solid var(--bdr);
  display:flex;flex-direction:column;
}
.sb-head{padding:20px 18px 16px;border-bottom:1px solid var(--bdr)}
.logo{display:flex;align-items:center;gap:9px;margin-bottom:3px}
.logo-icon{
  width:28px;height:28px;border-radius:7px;
  background:linear-gradient(135deg,var(--acc),var(--blu));
  display:flex;align-items:center;justify-content:center;font-size:13px
}
.logo-name{font-family:var(--mono);font-size:11px;font-weight:500;letter-spacing:.05em}
.logo-sub{font-family:var(--mono);font-size:9px;color:var(--mut);margin-left:37px}
.nav{padding:10px 10px;flex:1}
.nav-lbl{font-family:var(--mono);font-size:9px;letter-spacing:.14em;text-transform:uppercase;color:var(--mut);padding:8px 10px 5px}
.ni{
  display:flex;align-items:center;gap:9px;
  padding:8px 10px;border-radius:8px;
  cursor:pointer;font-size:13px;color:var(--mut2);
  transition:all .12s;user-select:none;position:relative
}
.ni:hover{background:var(--sur);color:var(--txt)}
.ni.on{background:linear-gradient(90deg,rgba(0,229,160,.1),rgba(0,229,160,.03));color:var(--acc);font-weight:500}
.ni.on::before{content:'';position:absolute;left:0;top:4px;bottom:4px;width:3px;background:var(--acc);border-radius:0 3px 3px 0}
.ni-ico{width:18px;text-align:center;font-size:14px}
.ni-badge{
  margin-left:auto;font-family:var(--mono);font-size:9px;
  padding:1px 6px;border-radius:99px;
  background:rgba(255,61,90,.2);color:var(--red);border:1px solid rgba(255,61,90,.3)
}
.sb-foot{padding:12px 16px;border-top:1px solid var(--bdr);font-size:11px;color:var(--mut)}
.sb-foot b{font-family:var(--mono);color:var(--acc2);font-weight:400}

/* main */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{
  height:52px;flex-shrink:0;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 22px;border-bottom:1px solid var(--bdr);background:var(--bg2)
}
.topbar-l{display:flex;align-items:center;gap:10px}
.topbar-title{font-size:15px;font-weight:700}
.topbar-chip{
  font-family:var(--mono);font-size:10px;padding:3px 8px;
  background:var(--sur2);border:1px solid var(--bdr2);border-radius:5px;color:var(--mut2)
}
.topbar-r{display:flex;align-items:center;gap:8px}
.content{flex:1;overflow-y:auto;padding:20px 22px}

/* stat row */
.stat-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:18px}
.stat{
  background:var(--sur);border:1px solid var(--bdr);border-radius:var(--r);
  padding:15px 16px;position:relative;overflow:hidden
}
.stat::after{content:'';position:absolute;top:0;left:0;right:0;height:2px}
.stat.s-urg::after{background:var(--red)}
.stat.s-rec::after{background:var(--yel)}
.stat.s-low::after{background:var(--acc)}
.stat.s-done::after{background:var(--blu)}
.stat-lbl{font-family:var(--mono);font-size:9px;letter-spacing:.13em;text-transform:uppercase;color:var(--mut);margin-bottom:9px}
.stat-val{font-family:var(--mono);font-size:30px;font-weight:500;line-height:1}
.sv-urg{color:var(--red)} .sv-rec{color:var(--yel)} .sv-low{color:var(--acc)} .sv-done{color:var(--blu)}
.stat-desc{font-size:11px;color:var(--mut);margin-top:5px}

/* card */
.card{background:var(--sur);border:1px solid var(--bdr);border-radius:var(--rl);overflow:hidden}
.card-head{
  display:flex;align-items:center;justify-content:space-between;
  padding:13px 16px;border-bottom:1px solid var(--bdr);gap:10px;flex-wrap:wrap
}
.card-title{font-size:13px;font-weight:700}
.pills{display:flex;gap:6px;flex-wrap:wrap}
.pill{
  font-family:var(--mono);font-size:10px;padding:3px 9px;
  border-radius:99px;border:1px solid var(--bdr2);background:transparent;
  color:var(--mut2);cursor:pointer;transition:all .12s;white-space:nowrap
}
.pill:hover{border-color:var(--txt);color:var(--txt)}
.pill.pa{border-color:var(--bdr2);color:var(--txt);background:var(--sur2)}
.pill.pu{border-color:rgba(255,61,90,.5);color:var(--red);background:rgba(255,61,90,.08)}
.pill.pr{border-color:rgba(245,200,66,.5);color:var(--yel);background:rgba(245,200,66,.08)}
.pill.pl{border-color:rgba(0,229,160,.4);color:var(--acc);background:rgba(0,229,160,.07)}
.pill.pd{border-color:rgba(61,143,255,.4);color:var(--blu);background:rgba(61,143,255,.07)}

table{width:100%;border-collapse:collapse}
thead th{
  font-family:var(--mono);font-size:9px;letter-spacing:.11em;text-transform:uppercase;
  color:var(--mut);text-align:left;padding:10px 14px;border-bottom:1px solid var(--bdr);white-space:nowrap
}
tbody tr{border-bottom:1px solid var(--bdr);cursor:pointer;transition:background .1s}
tbody tr:last-child{border-bottom:none}
tbody tr:hover{background:rgba(255,255,255,.02)}
td{padding:10px 14px;font-size:13px;vertical-align:middle}
.tm{font-size:13px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:250px;display:block}
.tu{font-family:var(--mono);font-size:10px;color:var(--mut);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:250px;display:block}

/* badge */
.bdg{
  display:inline-flex;align-items:center;
  font-family:var(--mono);font-size:10px;padding:3px 8px;border-radius:5px;
  white-space:nowrap;font-weight:500
}
.bu{background:rgba(255,61,90,.13);color:var(--red);border:1px solid rgba(255,61,90,.28)}
.br{background:rgba(245,200,66,.11);color:var(--yel);border:1px solid rgba(245,200,66,.23)}
.bl{background:rgba(0,229,160,.08);color:var(--acc);border:1px solid rgba(0,229,160,.2)}
.bp{background:rgba(74,85,104,.18);color:var(--mut2);border:1px solid var(--bdr2)}
.bi{background:rgba(61,143,255,.11);color:var(--blu);border:1px solid rgba(61,143,255,.23)}
.bd{background:rgba(0,229,160,.06);color:var(--acc2);border:1px solid rgba(0,229,160,.14)}
.bfr{background:rgba(168,85,247,.11);color:var(--pur);border:1px solid rgba(168,85,247,.23)}
.bto{background:rgba(245,200,66,.09);color:#c8a020;border:1px solid rgba(245,200,66,.19)}
.bui{background:rgba(61,143,255,.09);color:var(--blu);border:1px solid rgba(61,143,255,.19)}

/* score */
.sc-wrap{display:flex;align-items:center;gap:7px}
.sc-bar{width:48px;height:3px;background:var(--bdr2);border-radius:99px;overflow:hidden}
.sc-fill{height:100%;border-radius:99px}
.sc-num{font-family:var(--mono);font-size:12px;min-width:20px}

/* modal */
.overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.72);backdrop-filter:blur(5px);
  display:flex;align-items:center;justify-content:center;z-index:200;
  animation:fIn .15s ease
}
@keyframes fIn{from{opacity:0}to{opacity:1}}
.modal{
  background:var(--sur);border:1px solid var(--bdr2);border-radius:var(--rl);
  padding:24px 26px;width:570px;max-width:95vw;max-height:90vh;overflow-y:auto;
  animation:sUp .17s ease
}
@keyframes sUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.modal-head{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:18px}
.modal-title{font-size:15px;font-weight:700;line-height:1.4}
.x-btn{
  background:var(--sur2);border:1px solid var(--bdr2);color:var(--mut2);
  width:27px;height:27px;border-radius:7px;cursor:pointer;font-size:13px;flex-shrink:0;
  transition:all .12s;display:flex;align-items:center;justify-content:center
}
.x-btn:hover{color:var(--txt)}
.meta-g{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:14px}
.m-lbl{font-family:var(--mono);font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--mut);margin-bottom:5px}
.reason{
  background:var(--bg2);border:1px solid var(--bdr);border-radius:8px;
  padding:11px 13px;font-size:12px;color:var(--mut2);line-height:1.7;margin-bottom:14px
}
.hr{border:none;border-top:1px solid var(--bdr);margin:14px 0}
.m-acts{display:flex;gap:7px;justify-content:flex-end;flex-wrap:wrap}

/* buttons */
.btn{
  font-family:var(--sans);font-size:12px;font-weight:500;padding:7px 13px;
  border-radius:8px;border:1px solid transparent;cursor:pointer;transition:all .12s
}
.btn:disabled{opacity:.4;cursor:not-allowed}
.bg{background:transparent;border-color:var(--bdr2);color:var(--mut2)}
.bg:hover{border-color:var(--txt);color:var(--txt)}
.bacc{background:var(--acc);color:#051a10;border-color:var(--acc);font-weight:700}
.bacc:hover{background:var(--acc2);border-color:var(--acc2)}
.bblu{background:rgba(61,143,255,.13);color:var(--blu);border-color:rgba(61,143,255,.33)}
.bblu:hover{background:rgba(61,143,255,.22)}
.bico{
  background:var(--sur2);border:1px solid var(--bdr2);color:var(--mut2);
  width:31px;height:31px;border-radius:7px;cursor:pointer;font-size:13px;
  transition:all .12s;display:flex;align-items:center;justify-content:center
}
.bico:hover{color:var(--txt);border-color:var(--txt)}

/* form */
input,select,textarea{
  background:var(--bg2);border:1px solid var(--bdr2);color:var(--txt);
  font-family:var(--sans);font-size:13px;padding:8px 10px;border-radius:8px;
  outline:none;transition:border-color .12s;width:100%
}
input:focus,select:focus,textarea:focus{border-color:var(--acc)}
.fl{display:block;font-family:var(--mono);font-size:9px;letter-spacing:.09em;text-transform:uppercase;color:var(--mut);margin-bottom:5px}
.fr{margin-bottom:13px}

/* misc */
.ctr{display:flex;align-items:center;justify-content:center;padding:56px;gap:10px;color:var(--mut);font-size:13px}
.spin{width:18px;height:18px;border:2px solid var(--bdr2);border-top-color:var(--acc);border-radius:50%;animation:sp .65s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
.empty{text-align:center;padding:56px 20px;color:var(--mut)}
.empty-i{font-size:30px;margin-bottom:10px}

/* toast */
.toast-wrap{position:fixed;bottom:20px;right:20px;z-index:500;display:flex;flex-direction:column;gap:7px}
.toast{
  background:var(--sur2);border:1px solid var(--bdr2);border-radius:9px;
  padding:11px 16px;font-size:13px;animation:tIn .18s ease;
  max-width:290px;box-shadow:0 8px 22px rgba(0,0,0,.4);cursor:pointer
}
.toast.ok{border-left:3px solid var(--acc)}
.toast.er{border-left:3px solid var(--red)}
@keyframes tIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

/* setup */
.setup{min-height:100vh;background:var(--bg);display:flex;align-items:center;justify-content:center}
.setup-box{
  background:var(--sur);border:1px solid var(--bdr2);border-radius:16px;
  padding:38px 42px;width:450px;max-width:95vw
}
.setup-ey{font-family:var(--mono);font-size:10px;letter-spacing:.15em;text-transform:uppercase;color:var(--acc);margin-bottom:7px}
.setup-t{font-size:21px;font-weight:700;margin-bottom:5px}
.setup-d{font-size:12px;color:var(--mut2);line-height:1.75;margin-bottom:26px}
.setup-note{margin-top:14px;font-size:11px;color:var(--mut);text-align:center}

/* settings */
.set-sec{margin-bottom:22px}
.set-h{font-size:13px;font-weight:700;margin-bottom:12px;padding-bottom:9px;border-bottom:1px solid var(--bdr)}
.code{
  background:var(--bg);border:1px solid var(--bdr);border-radius:7px;
  padding:13px;font-family:var(--mono);font-size:11px;color:var(--mut2);
  overflow-x:auto;white-space:pre;line-height:1.7
}
.gsc-note{
  background:linear-gradient(90deg,rgba(61,143,255,.07),transparent);
  border:1px solid rgba(61,143,255,.2);border-radius:var(--r);
  padding:13px 15px;font-size:12px;color:var(--mut2);margin-bottom:16px;line-height:1.75
}
.step-list{counter-reset:step;list-style:none;padding:0}
.step-list li{
  counter-increment:step;display:flex;gap:10px;margin-bottom:11px;
  font-size:12px;color:var(--mut2);line-height:1.6
}
.step-list li::before{
  content:counter(step);
  font-family:var(--mono);font-size:10px;font-weight:500;
  width:20px;height:20px;border-radius:50%;flex-shrink:0;margin-top:1px;
  background:var(--sur2);border:1px solid var(--bdr2);color:var(--acc);
  display:flex;align-items:center;justify-content:center
}
code{font-family:var(--mono);font-size:11px;background:var(--sur2);padding:1px 5px;border-radius:4px}

/* articles */
.art-filters{display:flex;gap:9px;margin-bottom:16px;flex-wrap:wrap}
.art-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:11px}
.art-card{background:var(--sur);border:1px solid var(--bdr);border-radius:var(--r);padding:15px;transition:border-color .15s}
.art-card:hover{border-color:var(--bdr2)}
.art-t{font-size:13px;font-weight:500;line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;margin-bottom:5px}
.art-u{font-family:var(--mono);font-size:10px;color:var(--mut);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.art-f{display:flex;gap:7px;margin-top:9px;flex-wrap:wrap}
.chip{font-family:var(--mono);font-size:9px;padding:2px 6px;border-radius:4px;background:var(--sur2);border:1px solid var(--bdr2);color:var(--mut)}

/* run button */
.run-btn{
  display:flex;align-items:center;gap:7px;
  font-family:var(--sans);font-size:12px;font-weight:600;
  padding:7px 14px;border-radius:8px;cursor:pointer;transition:all .15s;
  background:rgba(0,229,160,.1);color:var(--acc);border:1px solid rgba(0,229,160,.3)
}
.run-btn:hover{background:rgba(0,229,160,.18)}
.run-btn:disabled{opacity:.5;cursor:not-allowed}

@media(max-width:900px){.sb{display:none}.stat-row{grid-template-columns:repeat(2,1fr)}}
@media(max-width:560px){.stat-row{grid-template-columns:repeat(2,1fr)}.meta-g{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useCallback } = React;
const { createClient } = supabase;

const CFG_KEY = 'seo_mgr_v3';
const ldCfg = () => { try { return JSON.parse(localStorage.getItem(CFG_KEY)||'{}'); } catch { return {}; } };
const svCfg = c => localStorage.setItem(CFG_KEY, JSON.stringify(c));

let _sb = null;
const getSb = (u, k) => { if (!_sb && u && k) _sb = createClient(u, k); return _sb; };

// utils
const PLV  = { urgent:'🔴 URGENT', recommended:'🟡 推奨', low:'🟢 低優先' };
const STV  = { pending:'未対応', in_progress:'対応中', done:'✓ 完了' };
const RTV  = { full_rewrite:'全面リライト', title_only:'タイトル改善', update_info:'情報更新' };
const scC  = s => s >= 70 ? 'var(--red)' : s >= 40 ? 'var(--yel)' : 'var(--acc)';

// ── Toast hook
function useToast() {
  const [ts, set] = useState([]);
  const add = (msg, type='ok') => {
    const id = Date.now();
    set(p => [...p, { id, msg, type }]);
    setTimeout(() => set(p => p.filter(t => t.id !== id)), 3500);
  };
  const rm = id => set(p => p.filter(t => t.id !== id));
  return { ts, add, rm };
}
function Toasts({ ts, rm }) {
  return <div className="toast-wrap">{ts.map(t =>
    <div key={t.id} className={`toast ${t.type}`} onClick={() => rm(t.id)}>{t.msg}</div>
  )}</div>;
}

// ── ScoreBar
function ScoreBar({ s }) {
  return (
    <div className="sc-wrap">
      <div className="sc-bar"><div className="sc-fill" style={{ width:`${s}%`, background:scC(s) }}/></div>
      <span className="sc-num" style={{ color:scC(s) }}>{s}</span>
    </div>
  );
}

// ── Badge
function Bdg({ kind, val }) {
  const cls = {
    level:  { urgent:'bu', recommended:'br', low:'bl' },
    status: { pending:'bp', in_progress:'bi', done:'bd' },
    type:   { full_rewrite:'bfr', title_only:'bto', update_info:'bui' },
  };
  const lbl = { level:PLV, status:STV, type:RTV };
  return <span className={`bdg ${cls[kind]?.[val]||''}`}>{lbl[kind]?.[val]||val}</span>;
}

// ── Setup Screen
function Setup({ onSave }) {
  const [url, su] = useState('');
  const [key, sk] = useState('');
  const [fnUrl, sfn] = useState('');
  const [err, se] = useState('');

  function save() {
    if (!url.trim()||!key.trim()) { se('URLとAnon Keyを入力してください'); return; }
    onSave({ supabaseUrl:url.trim(), supabaseKey:key.trim(), fnBaseUrl:fnUrl.trim() });
  }

  return (
    <div className="setup">
      <div className="setup-box">
        <div className="setup-ey">Initial Setup</div>
        <div className="setup-t">SEO Rewrite Manager</div>
        <div className="setup-d">
          Supabaseの接続情報を設定してください。<br/>
          ブラウザのlocalStorageに保存されます。
        </div>
        <div className="fr">
          <label className="fl">Supabase Project URL</label>
          <input value={url} onChange={e=>su(e.target.value)} placeholder="https://xxxxxxxxxx.supabase.co"/>
        </div>
        <div className="fr">
          <label className="fl">Supabase Anon Key</label>
          <input type="password" value={key} onChange={e=>sk(e.target.value)} placeholder="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."/>
        </div>
        <div className="fr">
          <label className="fl">Edge Function ベースURL（任意）</label>
          <input value={fnUrl} onChange={e=>sfn(e.target.value)} placeholder="https://xxxxxxxxxx.supabase.co/functions/v1"/>
        </div>
        {err && <div style={{color:'var(--red)',fontSize:12,marginBottom:10}}>{err}</div>}
        <button className="btn bacc" style={{width:'100%',padding:'10px'}} onClick={save}>接続する →</button>
        <div className="setup-note">設定は設定タブからいつでも変更できます</div>
      </div>
    </div>
  );
}

// ── Queue Tab
function QueueTab({ sb, cfg, toast }) {
  const [rows, setRows] = useState([]);
  const [loading, setLoading] = useState(true);
  const [filter, setFilter] = useState('all');
  const [sel, setSel] = useState(null);
  const [saving, setSaving] = useState(false);
  const [running, setRunning] = useState(false);

  const load = useCallback(async () => {
    setLoading(true);
    const { data, error } = await sb.from('seo_rewrite_queue').select('*').order('priority_score',{ascending:false});
    if (error) toast.add('取得エラー: '+error.message,'er');
    else setRows(data||[]);
    setLoading(false);
  },[sb]);

  useEffect(()=>{ load(); },[load]);

  const pending = rows.filter(r=>r.status!=='done');
  const counts = {
    all:   pending.length,
    urgent:      pending.filter(r=>r.priority_level==='urgent').length,
    recommended: pending.filter(r=>r.priority_level==='recommended').length,
    low:         pending.filter(r=>r.priority_level==='low').length,
    done:        rows.filter(r=>r.status==='done').length,
  };

  const filtered = filter==='done' ? rows.filter(r=>r.status==='done')
    : filter==='all' ? pending
    : pending.filter(r=>r.priority_level===filter);

  async function chStatus(id, status) {
    setSaving(true);
    const { error } = await sb.from('seo_rewrite_queue')
      .update({ status, updated_at:new Date().toISOString() }).eq('id',id);
    if (error) toast.add('更新失敗: '+error.message,'er');
    else { toast.add('ステータスを更新しました'); setSel(null); await load(); }
    setSaving(false);
  }

  async function runNow() {
    if (!cfg.fnBaseUrl) { toast.add('設定タブでEdge FunctionのURLを登録してください','er'); return; }
    setRunning(true);
    try {
      const res = await fetch(`${cfg.fnBaseUrl}/seo-daily`, {
        method:'POST',
        headers:{'Content-Type':'application/json','Authorization':`Bearer ${cfg.supabaseKey}`},
        body:'{}',
      });
      const data = await res.json();
      if (data.ok) { toast.add(`完了！ ${data.queued}件をキューに追加`); await load(); }
      else toast.add('実行エラー: '+data.error,'er');
    } catch(e) { toast.add('接続エラー: '+e.message,'er'); }
    setRunning(false);
  }

  const pills = [
    { k:'all', l:`すべて(${counts.all})`, c:'pa' },
    { k:'urgent', l:`URGENT(${counts.urgent})`, c:'pu' },
    { k:'recommended', l:`推奨(${counts.recommended})`, c:'pr' },
    { k:'low', l:`低優先(${counts.low})`, c:'pl' },
    { k:'done', l:`完了(${counts.done})`, c:'pd' },
  ];

  return (
    <>
      <div className="stat-row">
        <div className="stat s-urg"><div className="stat-lbl">URGENT</div><div className="stat-val sv-urg">{counts.urgent}</div><div className="stat-desc">緊急リライト</div></div>
        <div className="stat s-rec"><div className="stat-lbl">RECOMMENDED</div><div className="stat-val sv-rec">{counts.recommended}</div><div className="stat-desc">推奨リライト</div></div>
        <div className="stat s-low"><div className="stat-lbl">LOW</div><div className="stat-val sv-low">{counts.low}</div><div className="stat-desc">低優先度</div></div>
        <div className="stat s-done"><div className="stat-lbl">DONE</div><div className="stat-val sv-done">{counts.done}</div><div className="stat-desc">完了済み</div></div>
      </div>

      <div className="card">
        <div className="card-head">
          <span className="card-title">リライトキュー</span>
          <div style={{display:'flex',gap:8,alignItems:'center',flexWrap:'wrap'}}>
            <div className="pills">
              {pills.map(p=>(
                <button key={p.k} className={`pill ${filter===p.k?p.c:''}`} onClick={()=>setFilter(p.k)}>{p.l}</button>
              ))}
            </div>
            <button className="run-btn" onClick={runNow} disabled={running}>
              {running ? <><div className="spin" style={{width:13,height:13,borderWidth:2}}/> 実行中...</> : '▶ 今すぐ実行'}
            </button>
            <button className="bico" onClick={load} title="更新">↺</button>
          </div>
        </div>

        {loading ? (
          <div className="ctr"><div className="spin"/><span>読み込み中...</span></div>
        ) : filtered.length===0 ? (
          <div className="empty"><div className="empty-i">🎉</div><div>該当なし</div></div>
        ) : (
          <table>
            <thead><tr>
              <th>記事</th><th>優先度</th><th>スコア</th><th>対応種別</th>
              <th>順位</th><th>CTR</th><th>経過日</th><th>状態</th>
            </tr></thead>
            <tbody>
              {filtered.map(r=>(
                <tr key={r.id} onClick={()=>setSel(r)}>
                  <td><span className="tm">{r.title||'(無題)'}</span><span className="tu">{r.url}</span></td>
                  <td><Bdg kind="level" val={r.priority_level}/></td>
                  <td><ScoreBar s={r.priority_score}/></td>
                  <td><Bdg kind="type" val={r.rewrite_type}/></td>
                  <td style={{fontFamily:'var(--mono)',fontSize:12}}>{r.avg_position!=null?`${r.avg_position}位`:'—'}</td>
                  <td style={{fontFamily:'var(--mono)',fontSize:12}}>{r.ctr!=null?`${r.ctr}%`:'—'}</td>
                  <td style={{fontFamily:'var(--mono)',fontSize:12}}>{r.days_since_update!=null?`${r.days_since_update}日`:'—'}</td>
                  <td><Bdg kind="status" val={r.status}/></td>
                </tr>
              ))}
            </tbody>
          </table>
        )}
      </div>

      {sel && (
        <div className="overlay" onClick={e=>e.target===e.currentTarget&&setSel(null)}>
          <div className="modal">
            <div className="modal-head">
              <div className="modal-title">{sel.title}</div>
              <button className="x-btn" onClick={()=>setSel(null)}>✕</button>
            </div>
            <div style={{marginBottom:13}}>
              <a href={sel.url} target="_blank" rel="noopener"
                style={{fontFamily:'var(--mono)',fontSize:11,color:'var(--acc)',wordBreak:'break-all'}}>
                {sel.url} ↗
              </a>
            </div>
            <div className="meta-g">
              <div><div className="m-lbl">優先度</div><Bdg kind="level" val={sel.priority_level}/></div>
              <div><div className="m-lbl">スコア</div><ScoreBar s={sel.priority_score}/></div>
              <div><div className="m-lbl">対応種別</div><Bdg kind="type" val={sel.rewrite_type}/></div>
              <div><div className="m-lbl">平均順位</div><div style={{fontFamily:'var(--mono)',fontSize:13}}>{sel.avg_position!=null?`${sel.avg_position}位`:'—'}</div></div>
              <div><div className="m-lbl">CTR</div><div style={{fontFamily:'var(--mono)',fontSize:13}}>{sel.ctr!=null?`${sel.ctr}%`:'—'}</div></div>
              <div><div className="m-lbl">最終更新</div><div style={{fontFamily:'var(--mono)',fontSize:13}}>{sel.days_since_update!=null?`${sel.days_since_update}日前`:'—'}</div></div>
            </div>
            <div><div className="m-lbl" style={{marginBottom:6}}>判定理由</div><div className="reason">{sel.rewrite_reason||'—'}</div></div>
            <div style={{marginBottom:5}}><div className="m-lbl" style={{marginBottom:6}}>現在の状態</div><Bdg kind="status" val={sel.status}/></div>
            <div className="hr"/>
            <div className="m-acts">
              <button className="btn bg" onClick={()=>setSel(null)} disabled={saving}>キャンセル</button>
              {sel.status!=='pending'     && <button className="btn bg"   onClick={()=>chStatus(sel.id,'pending')}     disabled={saving}>未対応に戻す</button>}
              {sel.status!=='in_progress' && <button className="btn bblu" onClick={()=>chStatus(sel.id,'in_progress')} disabled={saving}>対応中にする</button>}
              {sel.status!=='done'        && <button className="btn bacc" onClick={()=>chStatus(sel.id,'done')}        disabled={saving}>✓ 完了にする</button>}
            </div>
          </div>
        </div>
      )}
    </>
  );
}

// ── Articles Tab
function ArticlesTab({ sb, toast }) {
  const [articles, setA] = useState([]);
  const [loading, setL] = useState(true);
  const [search, setSrch] = useState('');
  const [site, setSite] = useState('all');

  useEffect(()=>{
    (async()=>{
      setL(true);
      const { data, error } = await sb.from('seo_articles').select('*').order('last_modified',{ascending:false});
      if(error) toast.add('取得エラー: '+error.message,'er');
      else setA(data||[]);
      setL(false);
    })();
  },[sb]);

  const sites = [...new Set(articles.map(a=>a.site_url))].filter(Boolean);
  const filtered = articles.filter(a=>{
    const ms = site==='all'||a.site_url===site;
    const mq = !search||a.title?.toLowerCase().includes(search.toLowerCase())||a.url?.includes(search);
    return ms&&mq;
  });

  return (
    <>
      <div className="art-filters">
        <input placeholder="タイトル・URLで検索..." value={search} onChange={e=>setSrch(e.target.value)} style={{flex:1,minWidth:180,maxWidth:300}}/>
        <select value={site} onChange={e=>setSite(e.target.value)} style={{width:'auto'}}>
          <option value="all">全サイト</option>
          {sites.map(s=><option key={s} value={s}>{s}</option>)}
        </select>
        <span style={{fontSize:12,color:'var(--mut)',alignSelf:'center'}}>{filtered.length}件</span>
      </div>
      {loading ? <div className="ctr"><div className="spin"/></div> :
       filtered.length===0 ? <div className="empty"><div className="empty-i">📄</div><div>記事データなし。Edge Functionを実行してください。</div></div> :
       <div className="art-grid">
         {filtered.map(a=>(
           <div className="art-card" key={a.id}>
             <div className="art-t">{a.title||'(無題)'}</div>
             <div className="art-u">{a.url}</div>
             <div className="art-f">
               <span className="chip">ID: {a.post_id}</span>
               {a.last_modified && <span className="chip">{new Date(a.last_modified).toLocaleDateString('ja-JP')}</span>}
               {a.site_url && <span className="chip" style={{maxWidth:120,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{a.site_url.replace(/https?:\/\//,'')}</span>}
             </div>
           </div>
         ))}
       </div>
      }
    </>
  );
}

// ── GSC Tab
function GscTab({ sb, toast }) {
  const [data, setD] = useState([]);
  const [loading, setL] = useState(true);

  useEffect(()=>{
    (async()=>{
      setL(true);
      const { data, error } = await sb.from('seo_gsc_daily')
        .select('*, seo_articles(title,url)').order('date',{ascending:false}).limit(500);
      if(error) toast.add('取得エラー: '+error.message,'er');
      else setD(data||[]);
      setL(false);
    })();
  },[sb]);

  const lmap={};
  for(const r of data) if(!lmap[r.article_id]) lmap[r.article_id]=r;
  const rows=Object.values(lmap).sort((a,b)=>(b.impressions||0)-(a.impressions||0));

  return (
    <>
      <div className="gsc-note">
        📊 このタブはSupabase Edge Function（<code>seo-daily</code>）が投入したGSCデータを表示します。<br/>
        リライトキュータブの「▶ 今すぐ実行」ボタンまたはCronで自動実行されます。
      </div>
      <div className="card">
        <div className="card-head">
          <span className="card-title">GSCデータ（記事ごと最新日）</span>
          <span style={{fontSize:11,color:'var(--mut)'}}>{rows.length}件</span>
        </div>
        {loading ? <div className="ctr"><div className="spin"/></div> :
         rows.length===0 ? <div className="empty"><div className="empty-i">📊</div><div>データなし</div></div> :
         <table>
           <thead><tr><th>記事</th><th>最終取得日</th><th>クリック</th><th>表示回数</th><th>CTR</th><th>平均順位</th></tr></thead>
           <tbody>
             {rows.slice(0,100).map(r=>(
               <tr key={r.id}>
                 <td><span className="tm">{r.seo_articles?.title||'—'}</span><span className="tu">{r.seo_articles?.url}</span></td>
                 <td style={{fontFamily:'var(--mono)',fontSize:12}}>{r.date}</td>
                 <td style={{fontFamily:'var(--mono)',fontSize:12}}>{r.clicks?.toLocaleString()??'—'}</td>
                 <td style={{fontFamily:'var(--mono)',fontSize:12}}>{r.impressions?.toLocaleString()??'—'}</td>
                 <td style={{fontFamily:'var(--mono)',fontSize:12}}>{r.ctr!=null?`${(r.ctr*100).toFixed(1)}%`:'—'}</td>
                 <td style={{fontFamily:'var(--mono)',fontSize:12}}>{r.avg_position?`${r.avg_position.toFixed(1)}位`:'—'}</td>
               </tr>
             ))}
           </tbody>
         </table>
        }
      </div>
    </>
  );
}

// ── Sites Tab（サイト管理）
function SitesTab({ sb, toast }) {
  const [sites, setSites] = useState([]);
  const [loading, setLoading] = useState(true);
  const [showForm, setShowForm] = useState(false);
  const [form, setForm] = useState({ site_url:'', gsc_url:'', label:'' });
  const [saving, setSaving] = useState(false);
  const [delId, setDelId] = useState(null);

  const load = useCallback(async () => {
    setLoading(true);
    const { data, error } = await sb.from('seo_sites').select('*').order('created_at');
    if (error) toast.add('取得エラー: '+error.message,'er');
    else setSites(data||[]);
    setLoading(false);
  },[sb]);

  useEffect(()=>{ load(); },[load]);

  async function addSite() {
    if (!form.site_url.trim()) { toast.add('サイトURLを入力してください','er'); return; }
    setSaving(true);
    const row = {
      site_url: form.site_url.trim().replace(/\/$/,''),
      gsc_url: form.gsc_url.trim() || null,
      label: form.label.trim() || null,
      is_active: true,
    };
    const { error } = await sb.from('seo_sites').insert(row);
    if (error) toast.add('追加エラー: '+error.message,'er');
    else { toast.add('サイトを追加しました'); setForm({site_url:'',gsc_url:'',label:''}); setShowForm(false); await load(); }
    setSaving(false);
  }

  async function toggleActive(site) {
    const { error } = await sb.from('seo_sites').update({ is_active:!site.is_active, updated_at:new Date().toISOString() }).eq('id',site.id);
    if (error) toast.add('更新エラー: '+error.message,'er');
    else { toast.add(site.is_active ? '無効にしました' : '有効にしました'); await load(); }
  }

  async function deleteSite(id) {
    const { error } = await sb.from('seo_sites').delete().eq('id',id);
    if (error) toast.add('削除エラー: '+error.message,'er');
    else { toast.add('削除しました'); setDelId(null); await load(); }
  }

  return (
    <>
      <div className="card">
        <div className="card-head">
          <span className="card-title">管理サイト一覧</span>
          <div style={{display:'flex',gap:8}}>
            <button className="bico" onClick={load} title="更新">↺</button>
            <button className="btn bacc" onClick={()=>setShowForm(v=>!v)}>
              {showForm ? '✕ キャンセル' : '＋ サイトを追加'}
            </button>
          </div>
        </div>

        {showForm && (
          <div style={{padding:'16px',borderBottom:'1px solid var(--bdr)',background:'var(--bg2)'}}>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:10}}>
              <div className="fr" style={{marginBottom:0}}>
                <label className="fl">WordPress サイトURL <span style={{color:'var(--red)'}}>*</span></label>
                <input value={form.site_url} onChange={e=>setForm(p=>({...p,site_url:e.target.value}))} placeholder="https://example.com"/>
              </div>
              <div className="fr" style={{marginBottom:0}}>
                <label className="fl">管理ラベル（任意）</label>
                <input value={form.label} onChange={e=>setForm(p=>({...p,label:e.target.value}))} placeholder="例: sgs109 マッチングアフィリ"/>
              </div>
            </div>
            <div className="fr" style={{marginBottom:10}}>
              <label className="fl">GSCプロパティURL（省略時はサイトURLを使用）</label>
              <input value={form.gsc_url} onChange={e=>setForm(p=>({...p,gsc_url:e.target.value}))} placeholder="例: sc-domain:example.com または https://example.com/"/>
            </div>
            <div style={{fontSize:11,color:'var(--mut)',marginBottom:10,lineHeight:1.7}}>
              ※ GSCでドメインプロパティとして登録している場合は <code style={{fontFamily:'var(--mono)',fontSize:10}}>sc-domain:example.com</code> 形式で入力
            </div>
            <button className="btn bacc" onClick={addSite} disabled={saving}>
              {saving ? '追加中...' : '追加する'}
            </button>
          </div>
        )}

        {loading ? (
          <div className="ctr"><div className="spin"/></div>
        ) : sites.length===0 ? (
          <div className="empty">
            <div className="empty-i">🌐</div>
            <div>サイトが登録されていません。「＋ サイトを追加」から追加してください。</div>
          </div>
        ) : (
          <table>
            <thead><tr>
              <th>ラベル / URL</th><th>GSCプロパティ</th><th>状態</th><th>追加日</th><th></th>
            </tr></thead>
            <tbody>
              {sites.map(s=>(
                <tr key={s.id}>
                  <td>
                    <span className="tm">{s.label || s.site_url}</span>
                    {s.label && <span className="tu">{s.site_url}</span>}
                  </td>
                  <td style={{fontFamily:'var(--mono)',fontSize:11,color:'var(--mut2)'}}>
                    {s.gsc_url || <span style={{color:'var(--mut)'}}>サイトURLと同じ</span>}
                  </td>
                  <td>
                    <button
                      onClick={()=>toggleActive(s)}
                      className="bdg"
                      style={{cursor:'pointer',border:'none',
                        background: s.is_active ? 'rgba(0,229,160,0.08)' : 'rgba(74,85,104,0.18)',
                        color: s.is_active ? 'var(--acc2)' : 'var(--mut2)',
                      }}
                    >
                      {s.is_active ? '● 有効' : '○ 無効'}
                    </button>
                  </td>
                  <td style={{fontFamily:'var(--mono)',fontSize:11,color:'var(--mut)'}}>
                    {new Date(s.created_at).toLocaleDateString('ja-JP')}
                  </td>
                  <td>
                    <button
                      className="btn"
                      style={{fontSize:11,padding:'3px 10px',background:'rgba(255,61,90,0.1)',color:'var(--red)',borderColor:'rgba(255,61,90,0.25)'}}
                      onClick={()=>setDelId(s.id)}
                    >削除</button>
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
        )}
      </div>

      {delId && (
        <div className="overlay" onClick={e=>e.target===e.currentTarget&&setDelId(null)}>
          <div className="modal" style={{maxWidth:400}}>
            <div className="modal-head">
              <div className="modal-title">サイトを削除しますか？</div>
              <button className="x-btn" onClick={()=>setDelId(null)}>✕</button>
            </div>
            <div style={{fontSize:13,color:'var(--mut2)',marginBottom:20,lineHeight:1.7}}>
              このサイトに紐づく記事・GSCデータは削除されません。<br/>
              次回の実行からこのサイトが除外されます。
            </div>
            <div className="m-acts">
              <button className="btn bg" onClick={()=>setDelId(null)}>キャンセル</button>
              <button className="btn" style={{background:'rgba(255,61,90,0.15)',color:'var(--red)',borderColor:'rgba(255,61,90,0.3)'}} onClick={()=>deleteSite(delId)}>削除する</button>
            </div>
          </div>
        </div>
      )}
    </>
  );
}

// ── Settings Tab

      <div className="set-sec">
        <div className="set-h">📋 Supabase Secrets に登録する環境変数</div>
        <div className="code">{`SUPABASE_URL              = https://xxx.supabase.co
SUPABASE_SERVICE_ROLE_KEY = eyJ...（service_role key）
GSC_SERVICE_ACCOUNT_JSON  = {"type":"service_account","project_id":"..."}
CHATWORK_TOKEN            = xxxxxxxxxxxxxxxxxx
CHATWORK_ROOM_ID          = 000000000`}
        <div style={{fontSize:11,color:'var(--mut)',marginTop:8}}>
          ※ WP_SITES は不要になりました。サイトは「サイト管理」タブから追加してください。
        </div></div>
        <div style={{fontSize:11,color:'var(--mut)',marginTop:8}}>
          ※ Supabase ダッシュボード → Edge Functions → Secrets から登録
        </div>
      </div>

      {/* Cron設定 */}
      <div className="set-sec">
        <div className="set-h">⏰ Cron スケジュール設定（毎朝9時自動実行）</div>
        <ol className="step-list">
          <li><span>Supabase ダッシュボード →「<strong>Edge Functions</strong>」→ seo-daily をクリック</span></li>
          <li><span>「<strong>Schedule</strong>」タブ →「<strong>Add schedule</strong>」</span></li>
          <li><span>Cron 式: <code>50 23 * * *</code>（UTC 23:50 = 日本時間 08:50）</span></li>
          <li><span>保存すれば毎朝自動実行されます。翌朝9時にChatworkに通知が届きます。</span></li>
        </ol>
        <div style={{fontSize:11,color:'var(--mut)',marginTop:6}}>
          ※ Cron機能はSupabase Free プランでも利用可能です（2024年〜）
        </div>
      </div>

    </div>
  );
}

// ── App
function App() {
  const [cfg, setCfg] = useState(ldCfg);
  const [tab, setTab] = useState('queue');
  const toast = useToast();

  const isReady = !!(cfg.supabaseUrl && cfg.supabaseKey);
  const sb = isReady ? getSb(cfg.supabaseUrl, cfg.supabaseKey) : null;

  function updCfg(patch) {
    const next = { ...cfg, ...patch };
    svCfg(next);
    setCfg(next);
  }

  if (!isReady) return <Setup onSave={updCfg}/>;

  const navs = [
    { k:'queue',    i:'📋', l:'リライトキュー' },
    { k:'articles', i:'📄', l:'記事一覧' },
    { k:'gsc',      i:'📊', l:'GSCデータ' },
    { k:'sites',    i:'🌐', l:'サイト管理' },
    { k:'settings', i:'⚙️', l:'設定' },
  ];
  const titles = { queue:'リライトキュー', articles:'記事一覧', gsc:'GSCデータ', sites:'サイト管理', settings:'設定' };

  return (
    <div className="wrap">
      <aside className="sb">
        <div className="sb-head">
          <div className="logo">
            <div className="logo-icon">📈</div>
            <div className="logo-name">SEO Manager</div>
          </div>
          <div className="logo-sub">Rewrite Priority v1.0</div>
        </div>
        <nav className="nav">
          <div className="nav-lbl">Menu</div>
          {navs.map(n=>(
            <div key={n.k} className={`ni ${tab===n.k?'on':''}`} onClick={()=>setTab(n.k)}>
              <span className="ni-ico">{n.i}</span>{n.l}
            </div>
          ))}
        </nav>
        <div className="sb-foot">
          DB: <b>{cfg.supabaseUrl?.replace('https://','').split('.')[0]||'—'}</b>
        </div>
      </aside>

      <div className="main">
        <header className="topbar">
          <div className="topbar-l">
            <span className="topbar-title">{titles[tab]}</span>
          </div>
          <div className="topbar-r">
            <span className="topbar-chip">oshikatsu-planner</span>
          </div>
        </header>
        <div className="content">
          {tab==='queue'    && <QueueTab    sb={sb} cfg={cfg} toast={toast}/>}
          {tab==='articles' && <ArticlesTab sb={sb} toast={toast}/>}
          {tab==='gsc'      && <GscTab      sb={sb} toast={toast}/>}
          {tab==='sites'    && <SitesTab    sb={sb} toast={toast}/>}
          {tab==='settings' && <SettingsTab cfg={cfg} onUpdate={updCfg} toast={toast}/>}
        </div>
      </div>

      <Toasts ts={toast.ts} rm={toast.rm}/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
