<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>一次情報ライター | SEO Manager</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f5f6f8;--bg2:#fff;--sur:#fff;--sur2:#f0f2f5;
  --bdr:#e2e6ea;--bdr2:#d0d5dd;
  --txt:#1a1d23;--mut:#6b7280;--mut2:#4b5563;
  --acc:#0d9e6e;--acc2:#0a8a5e;
  --red:#dc2626;--yel:#d97706;--blu:#2563eb;--pur:#7c3aed;
  --mono:'IBM Plex Mono',monospace;--sans:'IBM Plex Sans JP',sans-serif;
  --r:8px;--rl:12px;
}
html{font-size:14px}
body{background:var(--bg);color:var(--txt);font-family:var(--sans);-webkit-font-smoothing:antialiased}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-thumb{background:var(--bdr2);border-radius:99px}
.wrap{display:flex;height:100vh}
.sb{width:220px;flex-shrink:0;background:var(--bg2);border-right:1px solid var(--bdr);display:flex;flex-direction:column}
.sb-head{padding:20px 18px 16px;border-bottom:1px solid var(--bdr)}
.brand{display:flex;align-items:center;gap:9px;margin-bottom:3px}
.brand-ico{width:28px;height:28px;border-radius:7px;background:var(--acc);display:flex;align-items:center;justify-content:center;font-size:13px;color:#fff;font-weight:700}
.brand-name{font-size:12px;font-weight:700}
.brand-sub{font-size:9px;color:var(--mut);margin-left:37px}
.nav{padding:10px;flex:1}
.nav-lbl{font-size:9px;letter-spacing:.14em;text-transform:uppercase;color:var(--mut);padding:8px 10px 5px;font-family:var(--mono)}
.ni{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:8px;cursor:pointer;font-size:13px;color:var(--mut2);transition:all .12s;text-decoration:none}
.ni:hover{background:var(--sur2);color:var(--txt)}
.ni.on{background:#ecfdf5;color:var(--acc2);font-weight:700;border-left:3px solid var(--acc);padding-left:7px}
.ni-ico{width:18px;text-align:center;font-size:14px}
.sb-foot{padding:12px 16px;border-top:1px solid var(--bdr);font-size:11px;color:var(--mut)}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{height:52px;flex-shrink:0;display:flex;align-items:center;justify-content:space-between;padding:0 22px;border-bottom:1px solid var(--bdr);background:var(--bg2)}
.topbar-title{font-size:15px;font-weight:700}
.content{flex:1;overflow-y:auto;padding:20px 22px}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:16px;height:calc(100vh - 94px)}
.panel{display:flex;flex-direction:column;gap:12px;overflow:hidden}
.card{background:var(--sur);border:1px solid var(--bdr);border-radius:var(--rl);overflow:hidden}
.card-head{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:1px solid var(--bdr);gap:10px}
.card-title{font-size:13px;font-weight:700}
.card-body{padding:14px}
.btn{font-family:var(--sans);font-size:12px;font-weight:500;padding:7px 13px;border-radius:8px;border:1px solid var(--bdr2);cursor:pointer;transition:all .12s;background:transparent;color:var(--mut2)}
.btn:hover{border-color:var(--txt);color:var(--txt)}
.btn-acc{background:var(--acc);color:#fff;border-color:var(--acc);font-weight:700}
.btn-acc:hover{background:var(--acc2)}
.btn-blu{background:rgba(37,99,235,.1);color:var(--blu);border-color:rgba(37,99,235,.3)}
.btn:disabled{opacity:.4;cursor:not-allowed}
input,select,textarea{background:var(--bg2);border:1px solid var(--bdr2);color:var(--txt);font-family:var(--sans);font-size:13px;padding:8px 10px;border-radius:8px;outline:none;transition:border-color .12s;width:100%}
input:focus,select:focus,textarea:focus{border-color:var(--acc)}
textarea{resize:vertical;line-height:1.7}
.fl{display:block;font-family:var(--mono);font-size:9px;letter-spacing:.09em;text-transform:uppercase;color:var(--mut);margin-bottom:5px}
.fr{margin-bottom:12px}
.ctr{display:flex;align-items:center;justify-content:center;padding:40px;gap:10px;color:var(--mut);font-size:13px;flex-direction:column}
.spin{width:20px;height:20px;border:2px solid var(--bdr2);border-top-color:var(--acc);border-radius:50%;animation:sp .65s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
.toast-wrap{position:fixed;bottom:20px;right:20px;z-index:500;display:flex;flex-direction:column;gap:7px}
.toast{background:var(--sur2);border:1px solid var(--bdr2);border-radius:9px;padding:11px 16px;font-size:13px;animation:tIn .18s ease;max-width:290px;box-shadow:0 4px 16px rgba(0,0,0,.12);cursor:pointer}
.toast.ok{border-left:3px solid var(--acc)}.toast.er{border-left:3px solid var(--red)}
@keyframes tIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

/* 出力エリア */
.output-area{
  flex:1;overflow-y:auto;
  font-size:13px;line-height:1.9;
  white-space:pre-wrap;word-break:break-word;
  padding:16px;
  background:var(--bg2);
  color:var(--txt);
  font-family:var(--sans);
  border:none;
  outline:none;
  width:100%;
  resize:none;
}

/* 出典バッジ */
.src-badge{
  display:inline-block;
  font-size:10px;
  padding:2px 7px;
  border-radius:4px;
  background:#eff6ff;
  color:#1e40af;
  border:1px solid #93c5fd;
  font-family:var(--mono);
  margin-left:4px;
  vertical-align:middle;
}

/* 設定パネル */
.setting-row{display:flex;align-items:center;gap:10px;margin-bottom:10px;flex-wrap:wrap}
.setting-label{font-size:12px;color:var(--mut2);white-space:nowrap;min-width:80px}

/* プログレス */
.progress-wrap{padding:14px 16px;border-top:1px solid var(--bdr);background:var(--sur2)}
.progress-text{font-size:12px;color:var(--mut);margin-bottom:6px}
.progress-bar-outer{height:4px;background:var(--bdr);border-radius:99px;overflow:hidden}
.progress-bar-inner{height:100%;background:var(--acc);border-radius:99px;transition:width .3s}

/* info box */
.info-box{background:#eff6ff;border:1px solid #93c5fd;border-radius:var(--r);padding:12px 14px;font-size:12px;color:#1e40af;line-height:1.7;margin-bottom:14px}

@media(max-width:900px){.sb{display:none}.two-col{grid-template-columns:1fr}}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useRef } = React;

const CFG_KEY = 'seo_mgr_v3';
const ldCfg = () => { try { return JSON.parse(localStorage.getItem(CFG_KEY)||'{}'); } catch { return {}; } };

function useToast() {
  const [ts, set] = useState([]);
  const add = (msg, type='ok') => { const id=Date.now(); set(p=>[...p,{id,msg,type}]); setTimeout(()=>set(p=>p.filter(t=>t.id!==id)),4000); };
  const rm = id => set(p=>p.filter(t=>t.id!==id));
  return { ts, add, rm };
}

const PAGES = [
  { href:'index.html',           icon:'📋', label:'リライトキュー' },
  { href:'keyword-ranking.html', icon:'🔑', label:'キーワード順位変動' },
  { href:'gsc-trends.html',      icon:'📈', label:'GSCトレンド' },
  { href:'freshness.html',       icon:'🔔', label:'情報鮮度アラート' },
  { href:'internal-links.html',  icon:'🔗', label:'内部リンク最適化' },
  { href:'competitors.html',     icon:'👁️', label:'競合記事監視' },
  { href:'monthly-report.html',  icon:'📑', label:'月次レポート' },
  { href:'article-writer.html',  icon:'✍️', label:'一次情報ライター', active:true },
];

function Sidebar({ cfg }) {
  return (
    <aside className="sb">
      <div className="sb-head">
        <div className="brand"><div className="brand-ico">S</div><div className="brand-name">SEO Manager</div></div>
        <div className="brand-sub">Rewrite Priority v2.0</div>
      </div>
      <nav className="nav">
        <div className="nav-lbl">Menu</div>
        {PAGES.map(p=>(
          <a key={p.href} href={p.href} className={'ni'+(p.active?' on':'')}>
            <span className="ni-ico">{p.icon}</span>{p.label}
          </a>
        ))}
      </nav>
      <div className="sb-foot">DB: <b style={{color:'var(--acc2)',fontFamily:'var(--mono)'}}>{cfg.supabaseUrl?.replace('https://','').split('.')[0]||'—'}</b></div>
    </aside>
  );
}

// 政府機関・公式統計の参考URL一覧（AIへのヒントとして使用）
const GOV_SOURCES = [
  'e-Gov法令検索（https://laws.e-gov.go.jp）',
  '厚生労働省（https://www.mhlw.go.jp）',
  '内閣府（https://www.cao.go.jp）',
  '総務省統計局（https://www.stat.go.jp）',
  '国土交通省（https://www.mlit.go.jp）',
  '文部科学省（https://www.mext.go.jp）',
  '経済産業省（https://www.meti.go.jp）',
  '消費者庁（https://www.caa.go.jp）',
  '金融庁（https://www.fsa.go.jp）',
  '警察庁（https://www.npa.go.jp）',
  '法務省（https://www.moj.go.jp）',
  '国税庁（https://www.nta.go.jp）',
  '日本年金機構（https://www.nenkin.go.jp）',
  '総務省（https://www.soumu.go.jp）',
  '農林水産省（https://www.maff.go.jp）',
  '環境省（https://www.env.go.jp）',
  'デジタル庁（https://www.digital.go.jp）',
  'e-Stat 政府統計の総合窓口（https://www.e-stat.go.jp）',
  '国立社会保障・人口問題研究所（https://www.ipss.go.jp）',
  '日本医師会（https://www.med.or.jp）',
].join('\n');

function ArticleWriterPage() {
  const cfg = ldCfg();
  const toast = useToast();

  const [heading, setHeading] = useState('');
  const [content, setContent] = useState('');
  const [keyword, setKeyword] = useState('');
  const [tone, setTone] = useState('informative');
  const [output, setOutput] = useState('');
  const [generating, setGenerating] = useState(false);
  const [progress, setProgress] = useState(0);
  const [progressText, setProgressText] = useState('');
  const outputRef = useRef(null);

  async function generate() {
    if(!heading.trim()) { toast.add('見出しタイトルを入力してください','er'); return; }
    if(!content.trim()) { toast.add('見出しの内容・メモを入力してください','er'); return; }
    if(!cfg.claudeApiKey) { toast.add('設定タブでClaude APIキーを登録してください','er'); return; }

    setGenerating(true);
    setOutput('');
    setProgress(10);
    setProgressText('AIが一次情報を調査中...');

    const toneMap = {
      informative: '情報提供型・客観的・読者が信頼できる文体',
      friendly: '親しみやすく読みやすい・やわらかい文体',
      expert: '専門家視点・詳細で権威ある文体',
    };

    const prompt = [
      'あなたは日本のSEOアフィリエイトライターです。以下の見出しと既存テキストをもとに、一次情報（政府機関・公式統計）を含む本文を作成してください。',
      '',
      '## 見出しタイトル',
      heading.trim(),
      '',
      keyword ? '## ターゲットキーワード\n' + keyword.trim() : '',
      '',
      '## 既存の内容・メモ（これをベースに膨らませる）',
      content.trim(),
      '',
      '## 文体',
      toneMap[tone],
      '',
      '## 参照すべき政府機関・公式統計サイト（実在するURLのみ使用）',
      GOV_SOURCES,
      '',
      '## 作成ルール',
      '1. 既存の内容・メモの意図を活かしながら、読者に価値ある情報に仕上げる',
      '2. 政府機関・公式統計から具体的な数字・データを最低2つ以上引用する',
      '3. 引用した情報には必ず出典を明記する（形式: 出典：〇〇省「△△調査」（https://...））',
      '4. 出典URLは実在する可能性が高いものだけ記載する。不確かな場合は省庁名のトップページURLにする',
      '5. 文字数は500〜800文字程度',
      '6. 見出しタグは含めず本文テキストのみ出力する',
      '7. 箇条書きより流れのある文章を優先する',
      '',
      '## 出力形式',
      '本文テキストのみ出力。冒頭に説明文は不要。すぐ本文から始める。',
      '出典は本文の該当箇所の直後に（出典：〇〇）の形で自然に組み込む。',
      '最後に「【参考資料】」として使用した出典一覧を記載する。',
    ].filter(Boolean).join('\n');

    try {
      setProgress(30);
      setProgressText('Claude APIで本文を生成中...');

      const res = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'x-api-key': cfg.claudeApiKey,
          'anthropic-version': '2023-06-01',
          'anthropic-dangerous-direct-browser-access': 'true',
        },
        body: JSON.stringify({
          model: 'claude-opus-4-5',
          max_tokens: 2000,
          messages: [{ role: 'user', content: prompt }],
        }),
      });

      setProgress(80);
      setProgressText('結果を処理中...');

      const data = await res.json();
      if(data.error) { toast.add('Claude APIエラー: '+data.error.message,'er'); setGenerating(false); return; }

      const result = data.content?.[0]?.text ?? '';
      setOutput(result);
      setProgress(100);
      setProgressText('完了！');
      toast.add('本文を生成しました');

      // 出力エリアにスクロール
      setTimeout(()=>{ if(outputRef.current) outputRef.current.scrollTop = 0; }, 100);

    } catch(e) {
      toast.add('エラー: '+e.message,'er');
    }
    setGenerating(false);
    setTimeout(()=>setProgress(0), 1500);
  }

  function copyOutput() {
    if(!output) return;
    const el = document.createElement('textarea');
    el.value = output;
    document.body.appendChild(el);
    el.select();
    document.execCommand('copy');
    document.body.removeChild(el);
    toast.add('コピーしました！');
  }

  function clear() {
    setHeading('');
    setContent('');
    setKeyword('');
    setOutput('');
  }

  const charCount = output.replace(/\s/g,'').length;

  return (
    <div className="wrap">
      <Sidebar cfg={cfg}/>
      <div className="main">
        <div className="topbar">
          <span className="topbar-title">✍️ 一次情報ライター</span>
          <div style={{fontSize:11,color:'var(--mut)'}}>政府機関・公式統計の出典リンク付き本文を自動生成</div>
        </div>
        <div className="content">
          <div className="two-col">

            {/* 左：入力パネル */}
            <div className="panel">
              <div className="info-box">
                📌 見出しタイトルと既存の内容（メモ・箇条書き・雑な文章でもOK）を貼り付けると、厚労省・内閣府などの公式データを引用した本文に仕上げます。
              </div>

              <div className="card" style={{flex:'0 0 auto'}}>
                <div className="card-head"><span className="card-title">入力</span>
                  <button className="btn" style={{fontSize:11,padding:'3px 9px'}} onClick={clear}>クリア</button>
                </div>
                <div className="card-body">
                  <div className="fr">
                    <label className="fl">見出しタイトル（H2・H3）*</label>
                    <input
                      value={heading}
                      onChange={e=>setHeading(e.target.value)}
                      placeholder="例: マッチングアプリの利用率と男女比【最新データ】"
                    />
                  </div>
                  <div className="fr">
                    <label className="fl">ターゲットキーワード（任意）</label>
                    <input
                      value={keyword}
                      onChange={e=>setKeyword(e.target.value)}
                      placeholder="例: マッチングアプリ 利用率 統計"
                    />
                  </div>
                  <div className="fr">
                    <label className="fl">見出しの内容・メモ *（箇条書き・雑なメモでもOK）</label>
                    <textarea
                      value={content}
                      onChange={e=>setContent(e.target.value)}
                      placeholder={'例:\n・マッチングアプリの利用者数は年々増加している\n・20代〜30代が中心\n・男性の方が女性より利用率が高い傾向\n・婚活目的の利用者も増えている\n・政府の少子化対策との関連も触れたい'}
                      style={{minHeight:200}}
                    />
                  </div>
                  <div className="setting-row">
                    <span className="setting-label">文体</span>
                    <select value={tone} onChange={e=>setTone(e.target.value)} style={{width:'auto',flex:1}}>
                      <option value="informative">情報提供型（客観的・信頼感）</option>
                      <option value="friendly">親しみやすい（読みやすい）</option>
                      <option value="expert">専門家視点（詳細・権威ある）</option>
                    </select>
                  </div>
                </div>
              </div>

              <button
                className="btn btn-acc"
                onClick={generate}
                disabled={generating}
                style={{padding:'10px',fontSize:13,fontWeight:700}}
              >
                {generating ? '生成中...' : '✍️ 一次情報付き本文を生成'}
              </button>

              {progress > 0 && (
                <div className="progress-wrap" style={{borderRadius:'var(--r)',border:'1px solid var(--bdr)'}}>
                  <div className="progress-text">{progressText}</div>
                  <div className="progress-bar-outer">
                    <div className="progress-bar-inner" style={{width:progress+'%'}}/>
                  </div>
                </div>
              )}

              {/* 参照する公式サイト一覧 */}
              <div className="card">
                <div className="card-head"><span className="card-title" style={{fontSize:12}}>📚 参照する公式サイト一覧</span></div>
                <div style={{padding:'10px 14px',fontSize:11,color:'var(--mut)',lineHeight:1.9,maxHeight:160,overflowY:'auto'}}>
                  {[
                    'e-Gov法令検索','厚生労働省','内閣府','総務省統計局',
                    '国土交通省','文部科学省','経済産業省','消費者庁',
                    '金融庁','国税庁','日本年金機構','e-Stat 政府統計の総合窓口',
                    '国立社会保障・人口問題研究所',
                  ].map(s=><span key={s} style={{display:'inline-block',margin:'2px 4px 2px 0',padding:'1px 7px',background:'#eff6ff',color:'#1e40af',borderRadius:4,border:'1px solid #93c5fd'}}>{s}</span>)}
                </div>
              </div>
            </div>

            {/* 右：出力パネル */}
            <div className="panel">
              <div className="card" style={{flex:1,display:'flex',flexDirection:'column'}}>
                <div className="card-head">
                  <span className="card-title">
                    生成された本文
                    {output && <span style={{fontFamily:'var(--mono)',fontSize:11,color:'var(--mut)',marginLeft:8,fontWeight:400}}>{charCount}文字</span>}
                  </span>
                  <div style={{display:'flex',gap:7}}>
                    {output && (
                      <>
                        <button className="btn btn-blu" style={{fontSize:11,padding:'4px 11px'}} onClick={copyOutput}>
                          コピー
                        </button>
                        <button className="btn" style={{fontSize:11,padding:'4px 11px'}} onClick={()=>setOutput('')}>
                          クリア
                        </button>
                      </>
                    )}
                  </div>
                </div>

                {generating && !output && (
                  <div className="ctr">
                    <div className="spin"/>
                    <div style={{fontSize:13,color:'var(--mut)'}}>{progressText}</div>
                    <div style={{fontSize:11,color:'var(--mut)'}}>政府機関のデータを調査して本文を構成しています...</div>
                  </div>
                )}

                {!generating && !output && (
                  <div className="ctr">
                    <div style={{fontSize:28,marginBottom:8}}>✍️</div>
                    <div style={{color:'var(--mut)'}}>左の入力欄を埋めて「生成」を押してください</div>
                    <div style={{fontSize:11,color:'var(--mut)',marginTop:4,textAlign:'center',lineHeight:1.7}}>
                      厚労省・内閣府などの<br/>公式データを自動で引用します
                    </div>
                  </div>
                )}

                {output && (
                  <textarea
                    ref={outputRef}
                    className="output-area"
                    value={output}
                    onChange={e=>setOutput(e.target.value)}
                    style={{flex:1}}
                  />
                )}
              </div>

              {output && (
                <div style={{background:'#fef3c7',border:'1px solid #fcd34d',borderRadius:'var(--r)',padding:'11px 14px',fontSize:12,color:'#92400e',lineHeight:1.7}}>
                  ⚠️ <strong>必ず確認してください：</strong>
                  出典URLが実際にアクセスできるか・データが正確かを確認した上で使用してください。AIが生成した統計データや引用箇所は実際のページで検証することを推奨します。
                </div>
              )}
            </div>
          </div>
        </div>
      </div>

      <div className="toast-wrap">
        {toast.ts.map(t=>(
          <div key={t.id} className={'toast '+t.type} onClick={()=>toast.rm(t.id)}>{t.msg}</div>
        ))}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<ArticleWriterPage/>);
</script>
</body>
</html>
